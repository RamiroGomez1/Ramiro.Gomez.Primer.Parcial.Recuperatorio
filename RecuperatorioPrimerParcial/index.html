<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Burger Palace | Menú</title>

        <!-- Importacion de GoogleFonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
            rel="stylesheet">

        <!-- Seteo de icono -->
        <link rel="icon" href="/assets/icono.png">

        <!-- Importacion de archivo CSS (Estilos) -->
        <link rel="stylesheet" href="./index.css">

    </head>

    <body>

        <!-- Encabezado -->
        <header class="header">
            <div id="contenedor-logo">
                <img id="icono-principal" src="./assets/icono.png"
                    alt="Logo Hamburguesería" />
                <h1 id="titulo-principal">Burger Palace</h1>
            </div>

            <nav id="listado-opciones">
                <a>Ramiro Gomez</a>
                <a href>Inicio</a>
                <a href="#hamburguesas">Hamburguesas</a>
                <a href="#bebidas">Bebidas</a>
                <a href="#tragos">Tragos</a>
                <a href="./pages/carrito/carrito.html">Mi carrito</a>
            </nav>
        </header>
        <!-- Contenido principal de la pagina -->

        <main>

            <!-- Seccion de Hamburguesas -->

            <section id="hamburguesas">
                <h2 class="h2-separador">Hamburguesas 🍔</h2>
                <input placeholder="Buscar hamburguesa" id="input-hamburguesa" class="input-area" oninput="filtrarProductos(hamburguesas, 'input-hamburguesa', 'listado-hamburguesas')" type="text">
                <button class="boton-ordenamiento" onclick="ordenarProductosPorPrecio(hamburguesas,'input-hamburguesa','listado-hamburguesas')">Ordenar por precio menor - mayor </button>
                <ul id="listado-hamburguesas">

                </ul>
            </section>

            <!-- Seccion de Bebidas -->
            <section id="bebidas">
                <h2 class="h2-separador">Bebidas 🍺</h2>
                <input id="input-bebidas" class="input-area" oninput="filtrarProductos(bebidas, 'input-bebidas', 'listado-bebidas')" placeholder="Buscar bebidas" type="text">
                <button class="boton-ordenamiento" onclick="ordenarProductosPorPrecio(bebidas,'listado-bebidas')">Ordenar por precio menor - mayor </button>
                <ul id="listado-bebidas">

                </ul>
            </section>

            <!-- Seccion de Tragos -->
            <section id="tragos">
                <h2 class="h2-separador">Tragos 🍸</h2>
                <input id="input-tragos" class="input-area" oninput="filtrarProductos(tragos, 'input-tragos', 'listado-tragos')" placeholder="Buscar tragos" type="text">
                <button class="boton-ordenamiento" onclick="ordenarProductosPorPrecio(tragos,'listado-tragos')">Ordenar por precio menor - mayor </button>
                <ul id="listado-tragos">

                </ul>
            </section>
        </main>

        <footer>
            <p>Todos los derechos reservados | Burger Palace 2026</p>
        </footer>

        <script src="index.js"></script>
    </body>

</html>
